<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* Förhindra scroll om du vill */
    }
    iframe {
      width: 100vw;  /* Täcker hela viewportens bredd */
      height: 100vh; /* Täcker hela viewportens höjd */
      border: none;  /* Ingen iframe-ram */
      display: block;
    }
  </style>
</head>
<body>
  <iframe src="https://www.worldguessr.com/"></iframe>
</body>
</html>
